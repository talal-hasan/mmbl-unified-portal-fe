version: "3.8"

services:

  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    environment:
      LDAP_ORGANISATION: "MMBL"
      LDAP_DOMAIN: "mmbl.local"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_CONFIG_PASSWORD: "admin"
      LDAP_TLS: "false"
    volumes:
      - ./test/users.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-bootstrap.ldif
    ports:
      - "389:389"
      - "636:636"
    command: --copy-service
    restart: unless-stopped

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8082:80"
    depends_on:
      - openldap

  # ← NEW: Postgres runs inside Docker, no local install needed
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: mmbl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.3
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres        # ← points to the container above
      KC_DB_PORT: 5432
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: root
      KC_DB_URL_DATABASE: mmbl
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    depends_on:
      - openldap
      - postgres                      # ← waits for Postgres to be ready

volumes:
  postgres_data:                      # ← data persists across restarts